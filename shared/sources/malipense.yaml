# Crawl targets (verified structure - 2026-01-22)
# Two-tier structure discovered from inspection:
#   1. French index pages: navigation/lookup by French headword
#   2. Lexicon pages: actual Maninka dictionary entries

french_index:
  url_pattern: "/emk/index-french/{letter}.htm"
  letters_in_navbar: "a b c d e f g h i j k l m n o p q r s t u v w x y z"
  letters_captured: "a b c d e f g h i j k l m n o p q r s t u v w y z"  # x.htm 404
  count_captured: 25
  purpose: "French→Maninka index (links to lexicon entries)"

lexicon:
  url_pattern: "/emk/lexicon/{letter}.htm"
  letters_in_navbar: "a b c d e ɛ f g h i j k l m n ɲ ŋ o ɔ p r s t u w x y z"
  letters_captured: "a b c d e ɛ f g h i j k l m n ɲ o ɔ p r s t u w x y"  # ŋ.htm, z.htm 404
  count_captured: 26
  purpose: "Main dictionary content (Maninka entries with definitions, examples, POS)"
  navbar_source: "https://www.mali-pense.net/emk/lexicon/indexfr.htm"

# Known missing pages (navbar includes them but they 404)
# These are documented to prevent noisy "error" reports on future crawls.
# The navbar is a UI artifact / template, not fully authoritative.
known_missing_pages:
  - url: "https://www.mali-pense.net/emk/index-french/x.htm"
    http_status: 404
    verified_at: "2026-01-22T04:27:30Z"
    reason: "No French words starting with X in the dictionary"
    recheck: false  # Expected permanent 404

  - url: "https://www.mali-pense.net/emk/lexicon/ŋ.htm"
    http_status: 404
    verified_at: "2026-01-22T04:28:20Z"
    reason: "Navbar includes ŋ but page doesn't exist (stale template or no entries)"
    recheck: true  # May be added later

  - url: "https://www.mali-pense.net/emk/lexicon/z.htm"
    http_status: 404
    verified_at: "2026-01-22T04:28:41Z"
    reason: "Navbar includes z but page doesn't exist (no Maninka words starting with z)"
    recheck: false  # Expected permanent 404

crawl_notes: |
  Two-tier structure (verified 2026-01-22):
  
  1. French index: /emk/index-french/{a-z}.htm (26 pages)
     - French headwords linking to Maninka entries in /lexicon/
     - Useful for French→Maninka lookup
  
  2. Lexicon: /emk/lexicon/{letter}.htm (28 pages, including ɛ ɲ ŋ ɔ)
     - THE MAIN CONTENT: Maninka entries with French/English glosses, examples, POS
     - Entries are anchors within pages (e.g., m.htm#mɔ̀ɔ)
     - ~7,283 lexemes / 8,799 entries per indexfr.htm
  
  Encoding: UTF-8 (verified from Content-Type headers)
  
  Note: Do NOT use /Lexique-Maninka/ paths — that's a different/older area.

# Robots.txt override (only set true if explicit permission obtained)
permission_override: false

# Disable controls
disabled_at: null
disable_reason: null

# Record identity notes
record_identity_notes: |
  Lexicon entries have stable anchor IDs (e.g., #e5403, #mɔ̀ɔ).
  Use record_locator.kind = "source_record_id" with the anchor name.
  
  For entries without anchor IDs, fall back to url_canonical + entry_index.
  
  Canonicalization: normalize https, lowercase host, no trailing slash.

